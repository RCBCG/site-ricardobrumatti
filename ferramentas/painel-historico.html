<head>

  <meta name="description" content="Painel histórico de cotações agropecuárias de gado de corte, boi gordo e outros indicadores econômicos do setor de corte.">
  <style>
    :root {
      --bg:        #faf9f7;
      --bg2:       #f4f2ee;
      --bg3:       #edeae4;
      --white:     #ffffff;
      --border:    #e2ddd6;
      --text:      #1c1917;
      --muted:     #78716c;
      --green:     #1b5e20;
      --green-mid: #2e7d32;
      --sans:      -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      --serif:     Georgia, serif;
      --radius:    12px;
      --shadow:    0 1px 3px rgba(0,0,0,0.05), 0 4px 16px rgba(0,0,0,0.03);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(20px);
      background: rgba(255, 255, 255, 0.9);
    }
    
    .nav-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.2s;
    }
    .back-btn:hover {
      color: var(--green);
    }

    .site-title {
      font-family: var(--serif);
      font-size: 1.1rem;
      font-weight: bold;
      color: var(--text);
      text-decoration: none;
    }
    .site-title span {
      color: var(--green);
    }

    main {
      flex-grow: 1;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .dashboard-header {
      text-align: center;
      margin-bottom: 1rem;
    }

    .dashboard-title {
      font-family: var(--serif);
      font-size: 2rem;
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    .dashboard-desc {
      font-size: 0.95rem;
      color: var(--muted);
    }

    .iframe-wrapper {
      position: relative;
      width: 100%;
      height: 1200px; /* Base height for standard screens */
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .iframe-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    footer {
      background: var(--white);
      border-top: 1px solid var(--border);
      padding: 2rem 1.5rem;
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 2rem;
    }
    footer p {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 0.5rem;
    }
    footer .footer-sub {
      font-size: 0.75rem;
      color: var(--muted);
      opacity: 0.8;
    }

    @media (max-width: 768px) {
      .dashboard-title {
        font-size: 1.6rem;
      }
      .iframe-wrapper {
        height: 800px; /* slightly smaller on mobile */
      }
    }
  </style>

        .btn-outline:hover {

        /* Standardizing clean red reset buttons to match the Image 2 style */
        .bg-red-600, .btn-danger, [id*="clearFormButton"], [id*="clearDataButton"], [onclick*="clearForm"], [onclick*="clearData"] {

            background-color: #b91c1c !important;
        }
